name: Deploy Application

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
      deploy_frontend:
        description: "Deploy admin frontend"
        required: false
        default: true
        type: boolean
      deploy_backend:
        description: "Deploy backend to EC2"
        required: false
        default: true
        type: boolean

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-north-1

jobs:
  # ─── Admin Frontend → S3 + CloudFront ──────────────────────────────────
  deploy-frontend:
    name: Deploy Admin Frontend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    if: github.event.inputs.deploy_frontend != 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Build workspace packages
        uses: ./.github/actions/build-packages

      - name: Build admin frontend
        run: pnpm --filter @apps/frontend build
        env:
          VITE_API_URL: ${{ vars.API_BASE_URL }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_S3 }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_S3 }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy admin to S3
        run: |
          S3_BUCKET="${{ vars.ADMIN_S3_BUCKET }}"

          if [ -z "$S3_BUCKET" ]; then
            echo "ADMIN_S3_BUCKET not set, skipping"
            exit 0
          fi

          echo "Deploying to s3://${S3_BUCKET}"

          aws s3 sync apps/frontend/dist "s3://${S3_BUCKET}" \
            --delete \
            --region "${{ env.AWS_REGION }}" \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html"

          aws s3 cp apps/frontend/dist/index.html "s3://${S3_BUCKET}/index.html" \
            --region "${{ env.AWS_REGION }}" \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          DIST_ID="${{ vars.ADMIN_CF_DISTRIBUTION }}"
          if [ -z "$DIST_ID" ]; then
            echo "ADMIN_CF_DISTRIBUTION not set, skipping"
            exit 0
          fi
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" --region us-east-1

  # ─── Backend → EC2 via SSH ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    if: github.event.inputs.deploy_backend != 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env

      - name: Build workspace packages
        uses: ./.github/actions/build-packages

      - name: Build backend
        run: pnpm --filter @apps/backend build

      - name: Install production deps (on CI runner)
        run: |
          pnpm install --prod --no-frozen-lockfile --ignore-scripts --filter @apps/backend...

      - name: Upload dist to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "apps/backend/dist/,apps/backend/package.json,apps/backend/node_modules/,packages/types/dist/,packages/types/package.json,node_modules/.pnpm/,node_modules/.modules.yaml,package.json,pnpm-lock.yaml,pnpm-workspace.yaml"
          target: "/home/ec2-user/la-table-amelie/"
          tar_dereference: true
          overwrite: true

      - name: Restart backend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          timeout: 120s
          script: |
            set -e
            REGION="eu-north-1"
            PREFIX="/la-table-amelie/production"
            APP_DIR="/home/ec2-user/la-table-amelie"

            echo "Refreshing secrets from SSM..."
            ssm_get() {
              aws ssm get-parameter \
                --region "$REGION" \
                --name "${PREFIX}/$1" \
                --with-decryption \
                --query "Parameter.Value" \
                --output text
            }

            cat > "${APP_DIR}/apps/backend/.env" <<ENVEOF
            NODE_ENV=production
            PORT=3001
            AWS_REGION=${REGION}
            INGREDIENTS_TABLE=$(ssm_get INGREDIENTS_TABLE)
            RECIPES_TABLE=$(ssm_get RECIPES_TABLE)
            SETTINGS_TABLE=$(ssm_get SETTINGS_TABLE)
            EVENTS_TABLE=$(ssm_get EVENTS_TABLE)
            S3_BUCKET=$(ssm_get S3_BUCKET)
            ADMIN_CREDENTIALS=$(ssm_get ADMIN_CREDENTIALS)
            JWT_SECRET=$(ssm_get JWT_SECRET)
            ENVEOF
            chmod 600 "${APP_DIR}/apps/backend/.env"

            echo "Restarting backend with PM2..."
            pm2 restart la-table-amelie-api || pm2 start ${APP_DIR}/apps/backend/dist/main.js \
              --name la-table-amelie-api \
              --cwd "${APP_DIR}/apps/backend" \
              --env production
            pm2 save

            echo "Health check..."
            sleep 3
            curl -f http://localhost:3001/health || echo "Health check failed (may need a moment)"

  # ─── Summary ────────────────────────────────────────────────────────────
  deployment-complete:
    name: Deployment Complete
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "Deployment Summary"
          echo "===================="
          echo "Frontend: ${{ needs.deploy-frontend.result }}"
          echo "Backend:  ${{ needs.deploy-backend.result }}"

          if [[ "${{ needs.deploy-frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.deploy-backend.result }}" == "failure" ]]; then
            echo "Deployment failed"
            exit 1
          else
            echo "All deployments complete"
          fi
